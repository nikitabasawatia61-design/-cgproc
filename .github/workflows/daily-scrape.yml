name: Daily Tender Scrape

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-core.txt

      - name: Install dependencies
        run: pip install -r requirements-core.txt

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          PYTHONUNBUFFERED: "1"
        run: python run_daily.py --headless --import-json --export-json

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update tender data [skip ci]"
          file_pattern: docs/data/tenders.json
          skip_dirty_check: true
