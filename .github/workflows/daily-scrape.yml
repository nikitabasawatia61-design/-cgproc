name: Daily Tender Scrape

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-core.txt

      - name: Install dependencies
        run: pip install -r requirements-core.txt

      - name: Test portal connectivity
        run: |
          curl -I --max-time 30 "https://eproc.cgstate.gov.in/CHEPS/business/getOpenRfqListAction.do" || echo "Portal may be slow or blocked from GitHub servers"

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates
          wget -q -O /tmp/google-linux-signing-key.pub https://dl.google.com/linux/linux_signing_key.pub
          gpg --batch --yes --no-tty --dearmor -o /tmp/google-chrome.gpg /tmp/google-linux-signing-key.pub
          sudo mv /tmp/google-chrome.gpg /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Run scraper
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
        run: python run_daily.py --headless --import-json --export-json

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update tender data [skip ci]"
          file_pattern: docs/data/tenders.json
          skip_dirty_check: true
